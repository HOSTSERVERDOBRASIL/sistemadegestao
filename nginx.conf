# nginx.conf — AtlasX Sistema de Gerenciamento
# Coloque em /etc/nginx/sites-available/atlasx e ative com:
#   ln -s /etc/nginx/sites-available/atlasx /etc/nginx/sites-enabled/
#   certbot --nginx -d seudominio.com.br -d www.seudominio.com.br
#   nginx -t && systemctl reload nginx

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name seudominio.com.br www.seudominio.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seudominio.com.br www.seudominio.com.br;

    # ─── TLS (gerenciado pelo Certbot) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Headers de segurança ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            SAMEORIGIN always;
    add_header X-Content-Type-Options     nosniff always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # ─── Tamanho máximo de upload ────────────────────────────────────────────
    client_max_body_size 20M;

    # ─── Frontend (arquivos estáticos do Vite build) ─────────────────────────
    root /var/www/atlasx/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── API backend (Node.js na porta 3000) ─────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
    }

    # ─── SSE (Server-Sent Events) — sem timeout de leitura ──────────────────
    location /api/events {
        proxy_pass             http://127.0.0.1:3000/events;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection        "";
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;
    gzip_proxied any;

    # ─── Cache de assets com hash no nome ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
